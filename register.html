<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="login-container">
    <h2>Crear cuenta</h2>

<form action="https://mateobsss.app.n8n.cloud/webhook-test/registro" method="POST">
  
    <label>Nombre de usuario</label>
    <input type="text" name="usuario" required>

    <label>Email</label>
  <input type="text" name="email" required>

  <label>Contraseña</label>
  <input type="password" name="password" required>
  
  <button type="submit">Registrarse</button>
</form>
    <p id="mensaje"></p>
</div>

<script>
document.getElementById("registroForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try {
        const res = await fetch("https://mateobsss.app.n8n.cloud/webhook-test/registro", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        document.getElementById("mensaje").innerText = "Registro enviado correctamente";
    } catch (error) {
        document.getElementById("mensaje").innerText = "Error al enviar";
    }
});
</script>

</body>
</html>
